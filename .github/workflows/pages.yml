name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build library + registry
        run: pnpm -F @cobos/tokens build && pnpm -F @cobos/react build && pnpm build:registry

      - name: Build docs site
        run: pnpm -F docs build

      - name: Build Storybook
        run: pnpm -F @cobos/react storybook:build

      - name: Publish registry and Storybook alongside docs
        run: |
          cp -r registry apps/docs/dist/registry
          cp -r packages/react/storybook-static apps/docs/dist/storybook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
